{% extends "base.html" %}

{% block title %}404 Not Found - Cybersecurity Toolkit{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center py-5">
            <div class="error-template">
                <h1 class="display-1 text-warning">404</h1>
                <h2 class="mb-4">Page Not Found</h2>
                <div class="error-details mb-4">
                    <i class="fas fa-map-signs fa-4x mb-3"></i>
                    <p class="lead">Sorry, the page you're looking for doesn't exist or has been moved.</p>
                </div>
                <div class="error-actions">
                    <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg me-2">
                        <i class="fas fa-home me-2"></i>Go Home
                    </a>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-lg">
                        <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
